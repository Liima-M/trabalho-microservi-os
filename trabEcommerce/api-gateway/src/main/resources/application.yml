server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        - id: catalog-service
          uri: http://catalog-service:8082
          predicates:
            - Path=/catalog/**
          filters:
            - StripPrefix=0

        - id: inventory-service
          uri: http://inventory-service:8083
          predicates:
            - Path=/inventory/**
          filters:
            - StripPrefix=0

        - id: cart-service
          uri: http://cart-service:8084
          predicates:
            - Path=/cart/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: http://order-service:8085
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=0

        - id: payment-service
          uri: http://payment-service:8086
          predicates:
            - Path=/payments/**
          filters:
            - StripPrefix=0

        - id: shipping-service
          uri: http://shipping-service:8087
          predicates:
            - Path=/shipping/**
          filters:
            - StripPrefix=0

        - id: review-service
          uri: http://review-service:8088
          predicates:
            - Path=/reviews/**
          filters:
            - StripPrefix=0

        - id: notification-service
          uri: http://notification-service:8089
          predicates:
            - Path=/notifications/**
          filters:
            - StripPrefix=0

jwt:
  secret: ${JWT_SECRET:changeme-super-secret-key-at-least-256-bits-long!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
