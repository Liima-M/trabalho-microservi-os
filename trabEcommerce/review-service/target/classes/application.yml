server:
  port: 8088

spring:
  application:
    name: review-service
  # PostgreSQL (COMMAND side)
  datasource:
    url: jdbc:postgresql://${DB_HOST:review-db}:${DB_PORT:5432}/${DB_NAME:review_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # MongoDB (QUERY side — projeção CQRS)
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:review-mongo}:${MONGO_PORT:27017}/${MONGO_DB:review_query_db}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
